body:
  text: 三雉說雉之性好淫而善鬪一雄率群雌飮啄於山梁間每春夏之交叢灌薈鬱雌鳴粥粥雄者一聞其聲則必振翮而至逼人而不疑是怒其他雄之畜雌者也虞者中其機飾木葉為翳捕雄雉為餌持入山麓折管吹之作雌鳴弄餌作媚雌之狀於是雄雉駕怒倐至於前虞者以畢覆之日獲數十余問虞者雉之欲同歟其有差殊歟虞者云類萬不同然大槩有三殘山短麓雉有千群吾逐日而捕或有一至一覆而得者再至再覆而得者或有一覆不得而終其身免捕者何也虞者曰吾荷翳倚林吹管弄餌雉乃側腦而聽延頸而望襯地而飛其來也如擲其止也如植近吾而目不瞬者一覆可獲也此雉之最惑而忘其禍者也一吹一弄而若不聞再吹再弄而心稍動鼓舞回翔去地尋丈而飛其來也若有懼其止也若有思然迷於欲而逼於吾則吾得一覆而雉以預防故旋脫而飛吾怒其然也翌日俟其怠也增修其翳即麓之時吹管弄餌迫真而不少釁然後僅得捕之此雉之稍警而知有禍者也其有聞跫音而决起閣閣然飛搏雲霄投林樾而不暇顧者最難捕吾怒其然也誓于心曰所不得此者吾無事術矣日往山林窺覦百端其忌人也猶是也吾乃潛形屛息兀若枯木盡吾術然後雉乃近前然欲心微而戒心勝故乍近乍遠縮縮然若有機械臨其上者吾乘便畢之閃若掣電見影而避其敏如神自此之後非管餌之所可誘罾畢之所可羅淡然若無雌雄之欲者焉吾安敢投其隙而展吾術乎此雉之最靈而遠害者也吾以此三者觀之足以警世之好荒者矣夫結契燕朋徑情耽色不恤人言嚴父不能教良友不能嘖靦然為非無所忌憚自罹罪罟終身不悟者一覆可獲之類也始雖以欲而迷亦能知有禍機而不敢肆一有所窘悔恨疚懷然猶本情未忘也及其燕昵之朋相引以誘艷美之辭相招以怨則翻然忘其愧恥復蹈前轍而終履禍機此再覆而獲之類也若禀性貞堅淸修自寶遠好色而不近恥淫荒而不屑然與燕朋相處不為所動則彼以百計中之期同於己然後已也一念之忽不知所陷幾近於亂而知悔絶燕朋從益友想前非而忸怩思日新而矜惕卒為善士名重一時此乃一覆不獲終身免捕之類也吾竊思之吾之善機械騁奇術羅致群雄者正猶燕朋之誘引善類驅納淫邪之地也噫雉之能不從管餌之誘者寡矣人之能不從佞誘之說者寡矣噫父母之情願為一覆而獲之類耶願為終身免捕之類歟汝當察其分也毋忽
