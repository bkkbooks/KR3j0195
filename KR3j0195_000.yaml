body:
  text: 並序訓子説者無為子為其子龜孫作也曷為訓之訓其所不逮也曷不自揆而濫為之説歟其言則俚而其意則古昔聖賢之遺意也何以不敢直斥而微示其意歟父子之間言猶婉也龜兒之解官歸學也或云爵祿不可辭也或云學業當及時也所論不同使人不能不眩於去就於是諭以大義令赴學籍猶恐有所闕漏略示筆談且勗之曰日省乎此深究其旨則去就之分明而進德之事熟靡不為涓埃之補竊觀子朱子與長子受之書曰大抵勤謹二字循之而上有無限好事吾雖未敢言而竊為汝願之反之而下有無限不好事吾雖不欲言而未免為汝憂之汝若好學在家足以讀書作文講明義理不待遠離膝下汝既不能今遣汝者恐汝在家汩於世務不得專意汝若到彼奮然勇為力改故習一味勤謹則吾猶望焉不然則與在家一般他日歸來只是舊時伎倆人物汝將何面目歸見父母親戚鄉黨故舊歟無忝爾所生在此一行噫古昔賢哲父子之間勸勉之思懇惻之情亦足想見矣夫父之於子猶農夫之於嘉穀也養穀不成終罹餓餒之患教子無成竟致孤危之禍其糞壤耘耨之法訓誨厲翼之方曷嘗少弛於心歟而况垂老之年支多不榮只留雙顆夏日冬夜追悼無期稠人衆會念至涕零居然為一段怪物為汝兾望之情當如何耶此吾説之所以作也為人父者體吾情而教子為人子者憫吾情而孝親則庶幾乎吾説之非空言矣
