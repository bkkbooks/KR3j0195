body:
  text: 登山説魯民有子三人焉甲沉實而跛乙好奇而全丙輕浮而捷勇過人居常力作丙常居最而乙次之甲辛勤服役僅得滿課而無所怠一日乙與丙約登泰山日觀峯試力爭修屩屐甲亦飭裝乙與丙相視而笑曰泰山之峯出雲表俯天下非健腳力者不能陟豈跛者所能睥睨哉甲哂曰聊且隨諸君末至萬幸也三子至泰山下乙與丙戒甲曰吾曹飛騰絶壑曾不一瞬可且先行甲唯唯丙在山下乙至山腰日已昏黑甲徐行不已直至山頂夜宿館下曉觀日輪湧海三子還家父各詢所得丙曰吾即山麓天日尚早自恃猱捷傍溪曲徑足無不到妖花怪草靡不採掇倣徨未竟暝色忽至暨宿岩下悲風聒耳澗水喧豗狐狸野干旋繞啼呼悄然疚懷思欲騁吾力而畏虎豹且止乙曰吾見衆峯排螺靑壁削鐵飛走淩高橫峯側嶺搜討靡遺峯愈多而愈峻腳力隨以疲疹甫及山腰而日已沒吾亦假息岩下雲霧暝晦咫尺不辨衣屨冷濕上思山冢則尚遙下思山足則亦遠姑安於此而不達矣甲曰吾思吾足之偏跛慮吾行之逼側直尋一路竛竮不輟猶恐日力之不給奚暇傍行而遠矚乎盡心竭力躋攀分寸登陟未休而從者云已至絶處矣吾仰視天衢日馭可接俯瞰積蘇蒼蒼然不知所窮群山若封衆壑如皺及乎落景沉海下界黑暗傍視則星辰交輝手理可鑑信可樂也卧未安寢而天雞一叫東方啓明殷紅抹海金濤蹴天赤鳳金蛇攪擾其間俄而朱輪轉輾乍上乍下目未交睫而大明升於大空矣真絶奇也父曰信有若等事也子路之勇冉求之藝而竟未達夫子之墻曾子竟以魯得之小子識之噫進修德業之序成就功名之路凡自卑而升高自下而趨上者莫不皆然毋恃力以自畫毋怠力以自棄庶幾乎跛者之能自勉也毋忽
