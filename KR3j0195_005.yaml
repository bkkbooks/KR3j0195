body:
  text: 溺桶說大市僻處官置溺桶備市人之急士子竊溲者抵以不潔之罪市傍有士夫畜不才子潛往溲之其父知之禁之痛子猶不聽日溲不止主者欲挺之畏父威未敢發一市人莫不非之子猶欣然自以為得計人有謹飭不敢溲者子反非笑曰怯哉若人何畏縮乃爾吾日溲猶無患何懼歟其父聞其肆呼嘖其子曰市廛乃萬人之海衆目所萃汝以士子公然白日溲溺其中能無愧乎秪見賤惡而禍或隨之顧有何利而敢犯如此子曰吾始也吾亦見士子之溲溺也未嘗不唾面辱之一日欲溲甚急姑且溲溺桶而甚便自是非溲此心不安始則於吾溺也人共喧笑中則笑者漸稀而莫吾止也今則衆共傍視而莫有非者然則吾所溺也宜無傷事體矣父曰噫汝已為人所棄矣始人之共笑者人皆以汝為士子兾其因此而改行也中也笑者漸稀然猶以汝為士子也今也傍視而無人詆者人不以人類待汝也汝觀夫犬彘之溲于途中人尚齒笑歟人而為非不為人齒笑者其此之類也不亦可悲之甚歟子曰傍人不非而翁乃非之踈者公而親者私何公者不我非而私者反非我歟父曰惟公故視汝之非棄汝不齒終無非詆其機甚慘惟私故見汝之非痛心疾首猶兾萬一之改其情可哀汝且觀之世無親者當無規者我死之後當知我言子出語人曰老翁無聞知禁我若此居無何其父下世已而子往溲故處忽聞腦後生風毒梃加額不覺揮倒絶而復蘇詰其梃者曰何物死虜敢爾搪揬吾溲於此幾近十年闔市人無敢誰何何物死虜敢爾搪揬梃者云闔市稔憤而今得伸汝尚搖喙歟縛置市中爭以瓦礫擲之其家舁歸踰月不起追思父訓悲泣自訟曰誠哉夫子之言也鏌鎁藏於戲笑卵翼隱於震怒今雖欲聞至論復可得歟嗚咽不自勝稽顙於柩前誓改前行卒為善士云
