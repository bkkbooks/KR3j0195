body:
  text: 盜子說民有業盜者教其子盡其術盜子亦負其才自以為勝父遠甚每行盜盜子必先入而後出捨輕而取重耳能聽遠目能察暗為群盜譽誇於父曰吾無爽於老子之術而強壯過之以此而往何憂不濟盜曰未也智窮於學成而裕於自得汝猶未也盜子曰盜之道以得財為功吾於老子功常倍之且吾年尚少得及老子之年當有別㨾手段矣盜曰未也行吾術重城可入祕藏可探然一有蹉跌禍敗隨之若夫無形迹之可尋應變機而不括則非有所自得者不能也汝猶未也盜子猶未之念聞盜後夜與其子至一富家令子入寶藏中盜子耽取寶物盜闔戶下鑰攪使主聞主家逐盜返視鎖鑰猶故也主還內盜子在藏中無計得出以爪搔爬作老鼠噬嚙之聲主云鼠在藏中損物不可不去張燈解鑰將視之盜子脫走主家共逐盜子窘度不能免繞池而走投石於水逐者云盜入水中矣遮欄尋捕盜子由是得脫歸怨其父曰禽獸猶知庇子息何所負相軋乃爾盜曰而後乃今汝當獨步天下矣凡人之技學於人者其分有限得於心者其應不窮而况困窮咈鬱能堅人之志而熟人之仁者乎吾所以窘汝者乃所以安汝也吾所以陷汝者乃所以拯汝也不有入藏迫逐之患汝安能出鼠嚙投石之奇乎汝因困而成智臨變而出奇心源一開不復更迷汝當獨步天下矣後果為天下難當賊夫盜賤惡之術也猶必自得然後乃能無敵於天下而况士君子之於道德功名者乎簪纓世祿之裔不知仁義之美學問之益身已顯榮妄謂能抗前烈而軼舊業此正盜子誇父之時也若能辭尊居卑謝豪縱愛淡薄折節志學潛心性理不為習俗所搖奪則可以齊於人可以取功名用舍行藏無適不然此正盜子因困成智終能獨步天下者也汝亦近乎是也毋憚在藏迫逐之患思有以自得於心可也毋忽
