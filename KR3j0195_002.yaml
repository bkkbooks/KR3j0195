body:
  text: 啖蛇說溟州之地多産仙藥藥局遣醫間一歲而採藥有一醫專是任頻往溟州始至則藥夫指其徒之一二者曰此是啖蛇者也莫不齒冷食不共器坐不連席不以人類視之後間歲而往嘲者漸微而前日之所謂啖蛇者親昵而莫忌又間歲而往則里無所謂啖蛇者而嘲笑之言已絶矣徐觀之人持叉頭木弓張絃小屈木入長林大谷中採藥遇蛇無問大小輒以弓叉按其首蛇昴首張唇遂以屈木弦挫之蛇齒盡脫手剝其皮藏于矢筒及飯熟加鹽炙之爭食無餘久則中毒而斃者相望噫蛇之蠕動蜿蜒鱗蟲而陸處者雖愚者皆知賤惡而趍避之如有所逼莫不嘔吐震栗何也人性然也溟州之人始也斥其非猶多有全其性者也中也斥者少而啖者衆然或有全其性者不為流俗所汚者矣終也舉一道莫知其非嘲笑一絶而相安於穢俗至此則人性盡蔽無復論其是非矣一州之民夫豈盡喪其天而不悟者歟必有作俑而誤之者矣其誤之也必曰蛇亦蟲魚之類也肥而香美近人而易捕論其狀與鱧奚擇哉於是試嘗於口而無所妨漸狃於心而無所憚積以歲月浸以成風靦然無所愧當是時彼安知啖蛇之可醜遺毒之可畏歟前日之所嘗非詆者又從而效之曰彼亦人也口未爽於味而獨嗜此何耶其必有至味者存乎其中矣吾前之非之者安知不幾於妄而彼之嗜之者又安知不有所見歟由是轉相浸染莫知其非哀哉士君子之於貨利聲色亦猶是也孰不知貪叨狂蕩之為可賤玷汚喪敗之為可畏歟然試嘗於心而卒忘其恥豈聞有齒冷嘲笑之言乎汝當審其幾也毋忽
